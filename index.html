<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI BDC Super Analysis v2.0 — Hendrick Honda</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;600;700;800&display=swap');
:root{
  --bg:#06080F;--bg2:#0B1120;--bg3:#0F1728;
  --bdr:#1E293B;--bdr2:#2A3A50;
  --text:#E2E8F0;--sub:#64748B;--muted:#334155;
  --blue:#00558C;--blue2:#0070B8;--red:#CC0000;
  --green:#22C55E;--amber:#F59E0B;--purple:#A855F7;
  --pink:#EC4899;--cyan:#06B6D4;--orange:#F97316;
  --Y:#EAB308;--B:#3B82F6;--G:#22C55E;--R:#EF4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hdr{background:linear-gradient(135deg,#00355A,var(--blue));padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;z-index:100;}
.hdr-logo{width:32px;height:32px;border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--blue);font-size:14px;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:800;color:#fff;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.hdr-badge{margin-left:auto;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:4px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid rgba(255,255,255,.15);}
#screen-input{max-width:660px;margin:0 auto;padding:36px 24px;}
.ih{text-align:center;margin-bottom:28px;}
.ih h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,#fff,#94A3B8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.ih p{font-size:12px;color:var(--sub);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.fu{margin-bottom:10px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;background:var(--bg2);border:1px solid var(--bdr2);border-radius:7px;padding:9px 11px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue2);}
.field textarea{resize:vertical;min-height:80px;font-size:12px;}
.field select option{background:#0B1120;}
.run-btn{width:100%;padding:14px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;margin-top:6px;transition:opacity .15s,transform .1s;letter-spacing:-.2px;}
.run-btn:hover{opacity:.9;transform:translateY(-1px);}
.layout{display:flex;height:calc(100vh - 57px);overflow:hidden;}
.panel-left{width:310px;flex-shrink:0;border-right:1px solid var(--bdr);display:flex;flex-direction:column;}
.panel-right{flex:1;overflow-y:auto;}
.ptabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.ptab{flex:1;padding:9px 6px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--sub);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.4px;}
.ptab.on{color:var(--text);border-bottom-color:var(--blue2);}
.pscroll{flex:1;overflow-y:auto;padding:12px;}
.pscroll::-webkit-scrollbar{width:3px;}
.pscroll::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px;}
.score-block{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:9px;margin-bottom:10px;border:1px solid var(--bdr);}
.score-ring{position:relative;width:58px;height:58px;flex-shrink:0;}
.score-ring svg{transform:rotate(-90deg);}
.score-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-n{font-size:20px;font-weight:900;line-height:1;}
.score-l{font-size:7px;text-transform:uppercase;letter-spacing:.4px;opacity:.6;}
.sr-title{font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
.sr-item{font-size:10px;color:#94A3B8;line-height:1.65;}
.irow{padding:5px 0;border-bottom:1px solid rgba(30,41,59,.5);}
.ilabel{font-size:8px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.ivalue{font-size:11px;color:var(--text);line-height:1.35;margin-top:1px;}
.mbs-badge{display:flex;align-items:center;gap:8px;padding:9px;border-radius:8px;margin-top:8px;}
.mbs-circle{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;flex-shrink:0;}
.step-card{border-radius:7px;padding:8px 10px;margin-bottom:5px;}
.step-num{font-size:8px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;margin-bottom:3px;}
.step-body{font-size:9px;color:#94A3B8;line-height:1.5;white-space:pre-wrap;}
.ctabs{display:flex;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:#080C18;z-index:10;}
.ctab{flex:1;padding:11px 6px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--sub);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;}
.ctab.on{color:var(--text);border-bottom-color:var(--blue2);}
.rinner{padding:14px 16px;}
.sec-title{font-size:9px;font-weight:800;color:var(--sub);letter-spacing:1.1px;text-transform:uppercase;margin-bottom:10px;}
.mopt{border-radius:9px;margin-bottom:8px;cursor:pointer;overflow:hidden;}
.mopt-hdr{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
.mopt-left{display:flex;align-items:flex-start;gap:8px;}
.opt-radio{width:17px;height:17px;border-radius:50%;border:2px solid var(--bdr2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.opt-dot{width:9px;height:9px;border-radius:50%;}
.opt-lbl{font-size:12px;font-weight:700;}
.opt-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.htag{font-size:7px;padding:1px 5px;border-radius:7px;font-weight:800;}
.ttag{display:inline-block;padding:2px 8px;border-radius:9px;font-size:8px;font-weight:800;letter-spacing:.4px;}
.mopt-body{padding:0 12px 12px;}
.m-subject{font-size:10px;color:var(--sub);margin-bottom:6px;}
.m-subject span{color:#CBD5E1;}
.m-bubble{background:#060A14;border-radius:7px;padding:12px 14px;border:1px solid var(--bdr);}
.m-bubble pre{font-family:'IBM Plex Sans',sans-serif;font-size:12px;line-height:1.7;color:#CBD5E1;white-space:pre-wrap;margin:0;}
.copy-btn{margin-top:8px;padding:6px 16px;border-radius:5px;border:none;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-family:inherit;font-weight:800;font-size:11px;cursor:pointer;}
.copy-btn.done{background:var(--green);}
.fu-tabs{display:flex;background:#111827;border-radius:8px;padding:3px;margin-bottom:12px;}
.futab{flex:1;padding:8px;border-radius:6px;border:none;background:transparent;color:var(--sub);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;}
.futab.on{background:var(--blue);color:#fff;}
.rep-bubble{background:#111827;border-radius:8px;padding:10px 12px;margin-bottom:12px;border-left:3px solid var(--amber);}
.rep-lbl{font-size:8px;font-weight:700;color:var(--amber);margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px;}
.rep-txt{font-size:11px;font-style:italic;color:#CBD5E1;line-height:1.55;}
.sub-sec{font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin:12px 0 6px;}
.new-btn{display:block;margin:0 0 14px;padding:7px 14px;border-radius:6px;border:1px solid var(--bdr2);background:var(--bg3);color:var(--sub);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.4px;}
.new-btn:hover{color:var(--text);}
.crm-block{background:#0a0f1a;border:1px solid #1a2a1a;border-radius:8px;padding:10px 12px;margin-top:14px;}
.crm-label{font-size:8px;font-weight:700;color:#4caf50;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.crm-line{font-size:10px;color:#64748B;line-height:1.7;font-family:'IBM Plex Mono',monospace;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#1E293B;border-radius:4px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">H</div>
  <div><div class="hdr-title">AI BDC Super Analysis v2.0</div><div class="hdr-sub">Voss × Hughes × MBS — Full Intel Pipeline</div></div>
  <div class="hdr-badge">Hendrick Honda Charlotte</div>
</div>
<div id="screen-input">
  <div class="ih">
    <h1>10-Step Super Analysis</h1>
    <p>Launch from the Chrome extension for full auto-fill, or paste manually — uses all captured intel</p>
  </div>
  <div class="g2">
    <div class="field"><label>Customer Name</label><input id="in-name" placeholder="First Last"></div>
    <div class="field"><label>Phone</label><input id="in-phone" placeholder="704-555-0000"></div>
  </div>
  <div class="g2">
    <div class="field"><label>Email</label><input id="in-email" placeholder="email@example.com"></div>
    <div class="field"><label>Lead Source</label>
      <select id="in-source">
        <option value="">Select source...</option>
        <option>TrueCar</option><option>TrueCar Extended Network</option><option>TrueCar Perks At Work</option>
        <option>Gubagoo VR</option><option>Gubagoo Live Chat</option>
        <option>ClearCar</option><option>CarGurus</option><option>Cars.com</option>
        <option>Xchange</option><option>HDS Program</option>
        <option>Honda.com</option><option>HendrickCars.com ePrice</option>
        <option>Dealer Inspire ePrice</option><option>Costco Auto</option>
        <option>Hendrick Website — $1000 Off New</option>
        <option>Hendrick Website — $500 Off Used</option>
        <option>TripleThreatt</option><option>Other</option>
      </select>
    </div>
  </div>
  <div class="fu field"><label>Vehicle of Interest</label><input id="in-vehicle" placeholder="2026 Honda CR-V EX-L Meteorite Gray"></div>
  <div class="g2">
    <div class="field"><label>Trade Vehicle</label><input id="in-trade" placeholder="2021 Toyota RAV4 XLE (if any)"></div>
    <div class="field"><label>Stock # (if known)</label><input id="in-stock" placeholder="T14587 or leave blank"></div>
  </div>
  <div class="g3">
    <div class="field"><label>Sales Status</label>
      <select id="in-status">
        <option>Uncontacted</option><option>Working</option><option>Customer Engaged</option>
        <option>Hot</option><option>VIP- Working</option><option>Appointment Set</option>
        <option>Long Term Follow Up</option><option>Non-Responsive</option>
      </select>
    </div>
    <div class="field"><label>Service Visits</label><input id="in-svc" placeholder="0" type="number"></div>
    <div class="field"><label>Sales Lifetime Value</label><input id="in-ltv" placeholder="$0.00"></div>
  </div>
  <div class="g2">
    <div class="field"><label>Equity Value</label><input id="in-equity" placeholder="(if known)"></div>
    <div class="field"><label>Area Code / ZIP / Location</label><input id="in-location" placeholder="704=Local / 917=NYC / ZIP 28205..."></div>
  </div>
  <div class="g3">
    <div class="field"><label>Credit Score</label><input id="in-credit" placeholder="665 (if visible)"></div>
    <div class="field"><label>VDP Price</label><input id="in-price" placeholder="$27,890 (from inventory)"></div>
    <div class="field"><label>Days on Lot</label><input id="in-days" placeholder="12" type="number"></div>
  </div>
  <div class="g2">
    <div class="field"><label>Outreach Stage</label><input id="in-stage" placeholder="Day 3 — 3 attempts, no response"></div>
    <div class="field"><label>Submission Time</label><input id="in-subtime" placeholder="2:14 AM / Evening / Business hours"></div>
  </div>
  <div class="fu field"><label>Customer Message (exact words)</label><textarea id="in-custmsg" style="min-height:55px" placeholder="Paste the customer's actual written message if they sent one — used for sensory channel and MBS detection..."></textarea></div>
  <div class="fu field"><label>Gubagoo Transcript / Sub-source / All Notes</label><textarea id="in-notes" placeholder="Paste Gubagoo chat transcript, sub-source detail (VDP $527/mo 665 credit $2K down dropout), VDP vs VSP, human takeover flag, behavioral data, anything from the lead..."></textarea></div>
  <div class="g2">
    <div class="field"><label>Similar Units in Stock</label><input id="in-similar" placeholder="3 similar CR-Vs in stock"></div>
    <div class="field"><label>Deal Stage</label><input id="in-dealstage" placeholder="In Showroom / Write Up / TO"></div>
  </div>
  <button class="run-btn" onclick="runAnalysis()">&#9889; Run 10-Step Super Analysis</button>
</div>
<div id="screen-results" style="display:none">
  <div class="layout">
    <div class="panel-left">
      <div class="ptabs">
        <button class="ptab on" onclick="setLP('intel',this)">Intel</button>
        <button class="ptab" onclick="setLP('steps',this)">10 Steps</button>
      </div>
      <div class="pscroll" id="lp-intel"></div>
      <div class="pscroll" id="lp-steps" style="display:none"></div>
    </div>
    <div class="panel-right" id="right-panel"></div>
  </div>
</div>
<script>
// ── COLOR MAPS ────────────────────────────────────────────────
var HC={'FIC':'#3B82F6','Cold Reading':'#A855F7','Suffering':'#EC4899','Double Bind':'#F59E0B','Embedded Cmd':'#22C55E','Needs/Fears':'#EF4444','Third-Party':'#06B6D4','Scarcity':'#F97316','Sensory (K)':'#8B5CF6','Sensory (V)':'#8B5CF6','Accusation Audit':'#EF4444','Label':'#EC4899','Mirror':'#64748B','Calibrated Q':'#3B82F6','No-Oriented Q':'#F59E0B','Black Swan':'#94A3B8'};
var TC={'RECOMMENDED':'#22C55E','COMPETITIVE':'#F59E0B','LOW PRESSURE':'#3B82F6','PERSONAL TOUCH':'#8B5CF6','TRANSPLANT LEAN':'#A855F7','URGENCY':'#F97316','EXISTING CUSTOMER':'#22C55E'};
var MBC={Yellow:'#EAB308',Blue:'#3B82F6',Green:'#22C55E',Red:'#EF4444'};
function sc(n){return n>=70?'#22C55E':n>=40?'#F59E0B':'#EF4444';}
var RESULT=null,LEAD=null,selT=null,selE=null,selFT=null,selFE=null,fuMode='replied',rTab='text';

// ── TRANSPLANT DETECTION ──────────────────────────────────────
var AREA_MAP={
  '917':'NYC','718':'NYC','212':'NYC','646':'NYC',
  '848':'New Jersey','609':'New Jersey','732':'New Jersey',
  '469':'Dallas','214':'Dallas','682':'Dallas','972':'Dallas',
  '678':'Atlanta','706':'Atlanta','404':'Atlanta','770':'Atlanta',
  '321':'Orlando','407':'Orlando',
  '312':'Chicago','224':'Chicago','773':'Chicago',
  '419':'Ohio','614':'Ohio',
  '304':'West Virginia',
  '910':'Fayetteville NC',
  '828':'Asheville NC',
  '415':'San Francisco','510':'Bay Area',
  '713':'Houston','832':'Houston',
  '305':'Miami','786':'Miami',
  '617':'Boston',
  '202':'DC','301':'DC/MD','703':'DC/VA',
  '503':'Portland OR','206':'Seattle'
};
var LOCAL=['704','980','803','336','910','828'];

function detectTransplant(phone,locationNote){
  var area=(phone||'').replace(/\D/g,'').slice(0,3);
  if(!area) return null;
  if(LOCAL.indexOf(area)>=0) return null;
  var city=AREA_MAP[area];
  if(area==='910') return {city:'Fayetteville NC',military:true,area:area};
  if(area==='828') return {city:'Asheville NC',instate:true,area:area};
  return city?{city:city,military:false,instate:false,area:area}:{city:'out of market ('+area+')',military:false,instate:false,area:area};
}

// ── SUFFERING LENS ────────────────────────────────────────────
function detectSuffering(lead){
  var notes=(lead.notes||'').toLowerCase();
  var src=(lead.source||'').toLowerCase();
  var svc=parseInt(lead.svc||lead.svcVisits)||0;
  var ltv=parseFloat((lead.ltv||'').replace(/[$,]/g,''))||0;
  if(notes.indexOf('2 am')>=0||notes.indexOf('11pm')>=0||notes.indexOf('midnight')>=0)
    return 'Late-night submission — anxiety, insomnia, agonized decision. Gentler tone, no urgency, acknowledge the weight of this choice.';
  if(notes.indexOf('665')>=0||notes.indexOf('620')>=0||notes.indexOf('subprime')>=0||notes.indexOf('near-prime')>=0||notes.indexOf('fair credit')>=0)
    return 'Near/subprime credit signals — expects hesitation or rejection. Privacy first, no judgment, show the path forward confidently.';
  if(notes.indexOf('dropout')>=0||notes.indexOf('stepped away')>=0||notes.indexOf('payment shock')>=0)
    return 'Payment calculator dropout — saw a number they couldn\'t stomach. Quiet financial anxiety. Address the real rate vs. calculator gap immediately.';
  if(lead.trade&&lead.trade.length>3&&ltv>0)
    return 'Existing customer trading in a vehicle — emotional attachment to current car. Honor the old vehicle, frame new as earned upgrade.';
  if(src.indexOf('xchange')>=0||svc>20)
    return 'Service-loyal customer — comfort with current vehicle creates resistance to change. The fear is disruption, higher payments, loss of familiar. Make the upgrade bigger than the inconvenience.';
  if(notes.indexOf('selling')>=0||notes.indexOf('relocat')>=0||notes.indexOf('mov')>=0)
    return 'Life change signals — relocation, lifestyle shift, or financial pressure. Move fast, be helpful, urgency without exploitation.';
  if(notes.indexOf('paralysis')>=0||notes.indexOf('not sure')>=0||notes.indexOf('exploring')>=0||notes.indexOf('just looking')>=0)
    return 'Decision paralysis / early-stage researcher — fear of regret. Simplify everything, reduce choices, make the next step feel small and safe.';
  if(lead.transplant)
    return 'Out-of-market buyer — distance creates friction. Logistics feel overwhelming. Remove the distance barrier, make purchase feel easy and supported.';
  return 'Internet buyer — wants a fair deal without games. Quiet fear: will this dealer waste my time or play the price game? Lead with transparency and respect for their research.';
}

// ── MBS PROFILE ───────────────────────────────────────────────
function detectMBS(lead){
  var notes=(lead.notes||'').toLowerCase();
  var src=(lead.source||'').toLowerCase();
  var svc=parseInt(lead.svc||lead.svcVisits)||0;
  var ltv=parseFloat((lead.ltv||'').replace(/[$,]/g,''))||0;
  // Existing customer = default Relator/Green
  if(ltv>0||svc>10)
    return{profile:'Relator',color:'Green',letter:'G',reason:'Existing customer with service/purchase history — loyalty signals default to Relator (Green). Warm, relationship-driven tone.'};
  // Service-to-sales = Relator
  if(src.indexOf('xchange')>=0||src.indexOf('campaign')>=0)
    return{profile:'Relator',color:'Green',letter:'G',reason:'Service-to-sales campaign — existing Hendrick relationship. Family-oriented, trust-based, appreciate being remembered.'};
  // Payment shock dropout = Guardian
  if(notes.indexOf('dropout')>=0||notes.indexOf('payment shock')>=0||notes.indexOf('stepped away')>=0||src.indexOf('gubagoo')>=0)
    return{profile:'Guardian',color:'Blue',letter:'B',reason:'Payment calculator dropout — risk-averse, security-focused. Needs reassurance, no surprises, privacy protection.'};
  // Specific trim research = Analyst
  if(notes.indexOf('sport touring')>=0||notes.indexOf('trailsport')>=0||notes.indexOf('ex-l')>=0||notes.indexOf('invoice')>=0||notes.indexOf('otd')>=0||notes.indexOf('out the door')>=0)
    return{profile:'Analyst',color:'Yellow',letter:'Y',reason:'Specific trim selection + research signals — wants competence and accuracy, fears buyer\'s remorse.'};
  // TrueCar / ClearCar / research platforms = Analyst
  if(src.indexOf('truecar')>=0||src.indexOf('clearcar')>=0||src.indexOf('cargurus')>=0)
    return{profile:'Analyst',color:'Yellow',letter:'Y',reason:'Research-driven platform — came with data and comparison. Analyst default: validate their research, provide complete information.'};
  // Family language = Relator
  if(notes.indexOf('family')>=0||notes.indexOf('kids')>=0||notes.indexOf('wife')>=0||notes.indexOf('husband')>=0||notes.indexOf('daughter')>=0||notes.indexOf('son')>=0)
    return{profile:'Relator',color:'Green',letter:'G',reason:'Family context in message — relationship and comfort-driven. Make them feel known and cared for.'};
  // Social profile MBS signal — highest if confirmed from lookup
  if(lead.socialProfile&&lead.socialProfile.mbsColor){var sp=lead.socialProfile;var spM={Yellow:'Analyst',Blue:'Guardian',Green:'Relator',Red:'Driver'};return{profile:spM[sp.mbsColor]||'Analyst',color:sp.mbsColor,letter:sp.mbsColor[0],reason:'Social profile confirmed: '+sp.mbsReason};}
  // Customer message analysis — highest signal
  var msg=(lead.customerMsg||'').toLowerCase();
  if(msg.length>5) {
    if(/\b(invoice|otd|out.the.door|breakdown|spreadsheet|compare|apr|interest rate|msrp)\b/.test(msg))
      return{profile:'Analyst',color:'Yellow',letter:'Y',reason:'Customer message contains pricing/research language — analytical buyer who has done the homework.'};
    if(/\b(family|kids|wife|husband|daughter|son|safe|reliable|comfortable|feel)\b/.test(msg))
      return{profile:'Relator',color:'Green',letter:'G',reason:'Customer message contains family/comfort language — relationship-driven Relator.'};
    if(/\b(just looking|not sure|exploring|maybe|thinking about|would it be)\b/.test(msg))
      return{profile:'Guardian',color:'Blue',letter:'B',reason:'Customer message shows hedging language — cautious Guardian who needs reassurance.'};
    if(msg.length<30&&msg.split(' ').length<8)
      return{profile:'Driver',color:'Red',letter:'R',reason:'Very short customer message — direct Driver who values efficiency and bottom-line.'};
  }
  // Direct/brief notes = Driver
  if(notes.length<20&&notes.length>0)
    return{profile:'Driver',color:'Red',letter:'R',reason:'Brief, direct message — values speed and efficiency. Bottom-line first, no pleasantries, respect their time.'};
  // Default = Guardian
  return{profile:'Guardian',color:'Blue',letter:'B',reason:'Ambiguous signals — defaulting to Guardian (Blue). Safest profile: reassuring, low-risk, no surprises.'};
}

// ── VOSS TECHNIQUE ────────────────────────────────────────────
function detectVoss(mbs,lead){
  var notes=(lead.notes||'').toLowerCase();
  if(mbs.color==='Green') return 'Mirroring + Labeling — reflect their language, name their emotion. "It sounds like you\'re looking for…"';
  if(mbs.color==='Blue'){
    if(notes.indexOf('dropout')>=0||notes.indexOf('payment')>=0)

  }
  if(mbs.color==='Yellow') return 'Calibrated Questions — "What\'s most important to you — keeping payment in a range, or maximizing your trade value?" Let them reach the conclusion themselves.';
  if(mbs.color==='Red') return 'Accusation Audit + Direct — "You\'ve done your homework. Here\'s the number. Here\'s the next step." Fast, direct, respect their time.';

// ── SENSORY CHANNEL ───────────────────────────────────────────
function detectSensory(lead){
  // Use actual customer message first, then notes
  var n=((lead.customerMsg||'')+(lead.notes||'')).toLowerCase();
  if(/\b(see|look|picture|show|clear|bright|vision|view|imagine|looks|showed)\b/.test(n)) return{ch:'Visual (V) — detected in customer message',words:['see','clear picture of','you will see that','looking at']};
  if(/\b(hear|sounds|tell|listen|resonates|rings|loud|quiet|talk|told)\b/.test(n)) return{ch:'Auditory (A) — detected in customer message',words:['tell you','walk you through','sounds right','here is what I can tell you']};
  return{ch:'Kinesthetic (K) — default (no message or neutral language)',words:['feel','comfortable','solid','manageable','handle']};
}

// ── SCORING ───────────────────────────────────────────────────
function calcScore(lead){
  var s=0,r=[];
  var ltv=parseFloat((lead.ltv||'').replace(/[$,]/g,''))||0;
  var svc=parseInt(lead.svc||lead.svcVisits)||0;
  if(ltv>0){s+=25;r.push('Repeat customer — LTV '+lead.ltv);}
  if(svc>=100){s+=20;r.push(svc+' service visits');}
  else if(svc>=50){s+=16;r.push(svc+' service visits');}
  else if(svc>=20){s+=12;r.push(svc+' service visits');}
  else if(svc>=5){s+=8;r.push(svc+' service visits');}
  else if(svc>0){s+=4;r.push(svc+' service visits');}
  if(lead.trade&&lead.trade.length>3){s+=15;r.push('Trade present: '+lead.trade.split(' ').slice(0,3).join(' '));}
  var src=(lead.source||'').toLowerCase();
  if(src.indexOf('xchange')>=0||src.indexOf('hds')>=0){s+=15;r.push('Loyalty/service source');}
  else if(src.indexOf('hds')>=0){s+=12;r.push('HDS Program');}
  else if(src.indexOf('truecar')>=0){s+=7;r.push('TrueCar lead');}
  else if(src.indexOf('cargurus')>=0||src.indexOf('cars.com')>=0){s+=9;r.push('Third-party source');}
  else if(src.length>0){s+=5;r.push('Internet source');}
  var st=(lead.status||lead.salesStatus||'').toLowerCase();
  if(st.indexOf('working')>=0||st.indexOf('engaged')>=0){s+=15;r.push('Active working status');}
  else if(st.indexOf('appointment')>=0){s+=12;r.push('Appointment set');}
  else if(st.indexOf('hot')>=0){s+=10;r.push('Hot status');}
  else if(st.indexOf('uncontacted')>=0){s+=5;}
  var eq=parseFloat((lead.equity||'').replace(/[$,()]/g,''))||0;
  if(eq>2000){s+=8;r.push('Positive equity +$'+eq.toLocaleString());}
  else if(eq>0){s+=5;r.push('Slight equity');}
  return{score:Math.min(s,100),reasons:r};
}

function runAnalysis(){
  var name=document.getElementById('in-name').value.trim();
  var vehicle=document.getElementById('in-vehicle').value.trim();
  if(!name){alert('Please enter a customer name.');return;}
  // vehicle optional when launched from extension
  var gv=function(id){var e=document.getElementById(id);return e?e.value.trim():'';};
  LEAD={
    name:name,firstName:name.split(' ')[0],
    phone:gv('in-phone'),
    email:gv('in-email'),
    source:gv('in-source'),
    vehicle:vehicle,
    trade:gv('in-trade'),
    stock:gv('in-stock'),
    status:gv('in-status'),
    svc:gv('in-svc'),
    svcVisits:gv('in-svc'),
    ltv:gv('in-ltv'),
    equity:gv('in-equity'),
    location:gv('in-location'),
    notes:gv('in-notes'),
    creditScore:gv('in-credit'),
    vdpPrice:gv('in-price'),
    daysOnLot:gv('in-days'),
    commsStage:gv('in-stage'),
    submissionTime:gv('in-subtime'),
    customerMsg:gv('in-custmsg'),
    similarUnits:gv('in-similar'),
    dealStage:gv('in-dealstage'),
  };
  var trans=detectTransplant(LEAD.phone,LEAD.location);
  LEAD.transplant=trans;
  var mbs=detectMBS(LEAD);
  var suffering=detectSuffering(LEAD);
  var voss=detectVoss(mbs,LEAD);
  var sensory=detectSensory(LEAD);
  var sr=calcScore(LEAD);
  var tmpl=buildTemplates(LEAD,mbs,trans,sensory,suffering,voss);
  RESULT={templates:tmpl,mbs:mbs,transplant:trans,score:sr.score,reasons:sr.reasons,suffering:suffering,voss:voss,sensory:sensory};
  document.getElementById('screen-input').style.display='none';
  document.getElementById('screen-results').style.display='block';
  renderLeft();
  renderRight();
}

function renderLeft(){
  var T=RESULT.templates;
  var mbs=RESULT.mbs;
  var score=RESULT.score;
  var col=sc(score);
  var mbc=MBC[mbs.color]||'#64748B';
  var mbt=mbs.color==='Yellow'?'#000':'#fff';
  var circum=2*Math.PI*22;

  // Intel
  var intel='<div class="score-block"><div class="score-ring"><svg width="58" height="58" viewBox="0 0 58 58"><circle cx="29" cy="29" r="22" fill="none" stroke="#1E293B" stroke-width="5"/><circle cx="29" cy="29" r="22" fill="none" stroke="'+col+'" stroke-width="5" stroke-dasharray="'+circum+'" stroke-dashoffset="'+circum*(1-score/100)+'" stroke-linecap="round"/></svg><div class="score-num"><div class="score-n" style="color:'+col+'">'+score+'</div><div class="score-l" style="color:'+col+'">Score</div></div></div><div><div class="sr-title">Purchase Likelihood</div>'+RESULT.reasons.map(function(r){return'<div class="sr-item">\u2713 '+r+'</div>';}).join('')+'</div></div>';
  intel+=ir('Customer',LEAD.name);
  if(LEAD.phone)intel+=ir('Phone',LEAD.phone+(RESULT.transplant?' \u2022 '+RESULT.transplant.city+' area':''));
  if(LEAD.email)intel+=ir('Email',LEAD.email);
  intel+=ir('Vehicle',LEAD.vehicle);
  if(LEAD.trade)intel+=ir('Trade',LEAD.trade);
  if(LEAD.stock)intel+=ir('Stock #',LEAD.stock);
  intel+=ir('Source',LEAD.source||'\u2014');
  intel+=ir('Status',LEAD.status||'\u2014');
  if(LEAD.svc)intel+=ir('Service Visits',LEAD.svc);
  if(LEAD.ltv)intel+=ir('Sales LTV',LEAD.ltv);
  if(LEAD.equity)intel+=ir('Equity',LEAD.equity);
  if(RESULT.transplant)intel+=ir('Location',RESULT.transplant.city+(RESULT.transplant.military?' \u2022 Military/Fort Liberty':RESULT.transplant.instate?' \u2022 In-state':''));
  intel+='<div class="mbs-badge" style="background:'+mbc+'12;border:1px solid '+mbc+'33"><div class="mbs-circle" style="background:'+mbc+';color:'+mbt+'">'+mbs.letter+'</div><div><div style="font-size:11px;font-weight:800;color:'+mbc+'">'+mbs.profile+' / '+mbs.color+'</div><div style="font-size:9px;color:#94A3B8;margin-top:2px;line-height:1.35">'+mbs.reason+'</div></div></div>';
  document.getElementById('lp-intel').innerHTML=intel;

  // 10 Steps
  var steps=[
    ['1','SIGNALS','#3B82F6',T.signals.map(function(s){return'\u2022 '+s;}).join('\n')],
    ['2','SUFFERING','#EC4899',T.suffering],
    ['3','MBS: '+mbs.profile.toUpperCase(),mbc,mbs.color+' / '+mbs.profile+'\n'+mbs.reason],
    ['4','NEEDS/FEARS','#EF4444','Need: '+(mbs.color==='Green'?'Belonging, connection — felt known and valued':mbs.color==='Yellow'?'Competence, accuracy — right vehicle, right choice':mbs.color==='Blue'?'Security, predictability — no surprises, no risk':'Control, speed — respect their time, bottom line')+'\nFear: '+(mbs.color==='Green'?'Being impersonal, forgotten, just a number':mbs.color==='Yellow'?'Making a mistake, buyer\'s remorse, missing something':mbs.color==='Blue'?'Rejection, judgment, financial exposure, hidden costs':'Loss of control, being manipulated, wasting time')],
    ['5','VOSS TECHNIQUE','#2980B9',RESULT.voss],
    ['6','SENSORY CHANNEL','#8B5CF6',RESULT.sensory.ch+'\nResponse uses: '+RESULT.sensory.words.join(', ')],
    ['7','FIC STRUCTURE','#3B82F6','Focus: '+T.fic.f+'\n\nInterest: '+T.fic.i+'\n\nCuriosity: '+T.fic.c],
    ['8','LINGUISTICS','#22C55E','Embedded Cmd: '+T.s8.ec+'\nCold Reading: '+T.s8.cr+'\nThird-Party: '+T.s8.tp+'\nScarcity: '+(T.s8.sc||'None — no real data to use')],
    ['9','DOUBLE BIND','#F59E0B',T.s9],
    ['10','REVIEW',T.s10.every(function(s){return s.indexOf('\u274c')<0;})?'#22C55E':'#F59E0B',(T.s10||[]).map(function(s){return'\u2713 '+s;}).join('\n')],
  ];
  document.getElementById('lp-steps').innerHTML=steps.map(function(s){return'<div class="step-card" style="background:'+s[2]+'08;border:1px solid '+s[2]+'33"><div class="step-num" style="color:'+s[2]+'">STEP '+s[0]+': '+s[1]+'</div><div class="step-body">'+s[3]+'</div></div>';}).join('');
}

function mo(o,key,activeKey,onClick){
  var tc=TC[o.tag]||'#64748B';
  var on=activeKey===key;
  var safeMsg=o.msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  _msgStore[key]=o.msg;
  return'<div class="mopt" style="background:'+(on?'#111827':'var(--bg2)')+';border:'+(on?'2px solid '+tc:'1px solid var(--bdr)')+';" onclick="('+onClick.toString()+')(\''+key+'\')"><div class="mopt-hdr"><div class="mopt-left"><div class="opt-radio" style="border-color:'+(on?tc:'var(--bdr2)')+'">'+(on?'<div class="opt-dot" style="background:'+tc+'"></div>':'')+'</div><div><div class="opt-lbl">'+o.label+'</div><div class="opt-tags">'+(o.hughes||[]).map(function(h){return'<span class="htag" style="background:'+(HC[h]||'#64748B')+'22;color:'+(HC[h]||'#64748B')+'">'+h+'</span>';}).join('')+'</div></div></div><span class="ttag" style="background:'+tc+'1A;color:'+tc+'">'+o.tag+'</span></div>'+(on?'<div class="mopt-body">'+(o.subject?'<div class="m-subject">Subject: <span>'+o.subject+'</span></div>':'')+'<div class="m-bubble"><pre>'+safeMsg+'</pre></div><button class="copy-btn" id="cb-'+key+'" onclick="event.stopPropagation();doCopy(\''+key+'\')">Copy</button></div>':'')+'</div>';
}

function doCopy(key){
  var txt=_msgStore[key];
  if(!txt)return;
  navigator.clipboard.writeText(txt);
  var b=document.getElementById('cb-'+key);
  if(b){b.textContent='\u2713 Copied';b.classList.add('done');setTimeout(function(){b.textContent='Copy';b.classList.remove('done');},1800);}
}

function setLP(tab,el){
  document.querySelectorAll('.ptab').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  document.getElementById('lp-intel').style.display=tab==='intel'?'block':'none';
  document.getElementById('lp-steps').style.display=tab==='steps'?'block':'none';
}
function setRT(tab,el){
  rTab=tab;selT=null;selE=null;selFT=null;selFE=null;
  document.querySelectorAll('.ctab').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');renderRC(tab);
}
function setFU(mode){fuMode=mode;selFT=null;selFE=null;renderRC('followup');}
function backToInput(){
  document.getElementById('screen-results').style.display='none';
  document.getElementById('screen-input').style.display='block';
}

// ── URL PARAMS (from Chrome extension) ──────────────────────
(function(){
  var p=new URLSearchParams(window.location.search);
  if(!p.get('name'))return;
  document.getElementById('in-name').value=p.get('name')||'';
  document.getElementById('in-phone').value=p.get('phone')||'';
  document.getElementById('in-email').value=p.get('email')||'';
  document.getElementById('in-source').value=p.get('source')||'';
  document.getElementById('in-vehicle').value=p.get('vehicle')||'';
  document.getElementById('in-trade').value=p.get('trade')||'';
  document.getElementById('in-stock').value=p.get('stock')||'';
  document.getElementById('in-status').value=p.get('status')||'Uncontacted';
  document.getElementById('in-svc').value=p.get('svcVisits')||'';
  document.getElementById('in-ltv').value=p.get('ltv')||'';
  document.getElementById('in-equity').value=p.get('equity')||'';
  document.getElementById('in-location').value=p.get('location')||'';
  document.getElementById('in-notes').value=p.get('notes')||'';
  // New fields from v2 extension
  if(document.getElementById('in-credit'))   document.getElementById('in-credit').value=p.get('creditScore')||'';
  if(document.getElementById('in-price'))    document.getElementById('in-price').value=p.get('vdpPrice')||'';
  if(document.getElementById('in-days'))     document.getElementById('in-days').value=p.get('daysOnLot')||'';
  if(document.getElementById('in-stage'))    document.getElementById('in-stage').value=p.get('commsStage')||'';
  if(document.getElementById('in-subtime'))  document.getElementById('in-subtime').value=p.get('submissionTime')||'';
  if(document.getElementById('in-custmsg'))  document.getElementById('in-custmsg').value=p.get('customerMsg')||'';
  if(document.getElementById('in-similar'))  document.getElementById('in-similar').value=p.get('similarUnits')||'';
  if(document.getElementById('in-dealstage'))document.getElementById('in-dealstage').value=p.get('dealStage')||'';
  // Social profile lookup removed
  // Auto-run when launched from extension
  if(p.get('autorun')==='1'&&p.get('name')) {
    // Try at 800ms, then again at 2000ms as fallback
    setTimeout(function(){
      var n=document.getElementById('in-name').value.trim();
      var v=document.getElementById('in-vehicle').value.trim();
      if(n) runAnalysis();
    }, 800);
    setTimeout(function(){
      // Fallback if first attempt failed
      if(document.getElementById('screen-input').style.display!=='none'){
        var n=document.getElementById('in-name').value.trim();
        if(n) runAnalysis();
      }
    }, 2200);
  }
})();
</script>
